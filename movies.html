<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Фильмы</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="main-header">
    <div class="container header-content">
        <!-- Логотип-сердце ведет на главную -->
        <a href="index.html" class="main-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
        </a>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="search" placeholder="Поиск фильма...">
            </div>
            
            <!-- Фильтр по жанрам -->
            <select id="genre-filter">
                <option value="all">Все жанры</option>
                <option value="horror">Хоррор</option>
                <option value="sci-fi">Фантастика</option>
                <option value="drama">Драма</option>
            </select>

            <!-- Фильтр по качеству/типу -->
            <select id="quality-filter">
                <option value="all">Любое качество</option>
                <option value="4k">4K Ultra HD</option>
                <option value="fhd">Full HD</option>
            </select>

            <!-- Фильтр просмотра -->
            <select id="status-filter">
                <option value="all">Статус: Все</option>
                <option value="done">Просмотрено</option>
                <option value="undone">Не просмотрено</option>
            </select>
        </div>
    </div>
</header>

<main class="container">
    <div class="games-grid">
        
        <!-- ПРИМЕР ФИЛЬМА 1 -->
        <div class="game-card">
            <div class="card-image">
                <img src="images/interstellar.jpg" alt="Interstellar">
                <span class="badge-year">2014</span>
            </div>
            <div class="card-content">
                <h3>Интерстеллар</h3>
                <p>Научно-фантастический шедевр Кристофера Нолана о путешествии сквозь время и пространство.</p>
                <div class="tags">
                    <span class="tag tag-sci-fi">Фантастика</span>
                    <span class="tag tag-4k">4K</span>
                    <span class="tag tag-done">Просмотрено</span>
                </div>
            </div>
        </div>

        <!-- ПРИМЕР ФИЛЬМА 2 -->
        <div class="game-card">
            <div class="card-image">
                <img src="images/conjuring.jpg" alt="The Conjuring">
                <span class="badge-year">2013</span>
            </div>
            <div class="card-content">
                <h3>Заклятие</h3>
                <p>Один из самых страшных хорроров современности, основанный на реальных расследованиях Эда и Лоррейн Уоррен.</p>
                <div class="tags">
                    <span class="tag tag-horror">Хоррор</span>
                    <span class="tag tag-fhd">Full HD</span>
                    <span class="tag tag-undone">Не просмотрено</span>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="js.js"></script>
</body>
</html>
