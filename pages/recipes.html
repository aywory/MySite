<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <meta name="description" content="Recipe collection by category and difficulty with preparation status.">
    <meta property="og:title" content="Recipes | Tvoy Mir">
    <meta property="og:description" content="Browse recipes by category, difficulty and cooked status.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="/pages/recipes.html">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/style-mobile.css" media="(max-width: 1100px)">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="container">
            <div class="header-inner">

                <a href="../index.html" class="main-logo">
                    <div class="logo-mark">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                        </svg>
                    </div>
                    <span class="logo-name">Tvoy Mir</span>
                </a>

                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle filters" aria-expanded="false" aria-controls="filters-menu">
                    <span></span><span></span><span></span>
                </button>

                <div class="filters" id="filters-menu" role="region" aria-label="Filters">

                    <div class="search-wrap">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="search" placeholder="Search recipes..." aria-label="Search recipes">
                    </div>

                    <div class="custom-select" data-filter="category">
                        <button class="select-trigger" type="button" data-select-label="Category" aria-label="Category">
                            <span class="select-label">Category</span>
                            <span class="arrow" aria-hidden="true"></span>
                        </button>
                        <div class="select-options" id="recipes-category-options">
                            <div class="option active" data-value="all">All</div>
                            <div class="option" data-value="breakfast">Breakfast</div>
                            <div class="option" data-value="lunch">Lunch</div>
                            <div class="option" data-value="dinner">Dinner</div>
                            <div class="option" data-value="dessert">Dessert</div>
                            <div class="option" data-value="snack">Snack</div>
                        </div>
                    </div>

                    <div class="custom-select" data-filter="difficulty">
                        <button class="select-trigger" type="button" data-select-label="Difficulty" aria-label="Difficulty">
                            <span class="select-label">Difficulty</span>
                            <span class="arrow" aria-hidden="true"></span>
                        </button>
                        <div class="select-options" id="recipes-difficulty-options">
                            <div class="option active" data-value="all">Any</div>
                            <div class="option" data-value="easy">Easy</div>
                            <div class="option" data-value="medium">Medium</div>
                            <div class="option" data-value="hard">Hard</div>
                        </div>
                    </div>

                    <div class="custom-select" data-filter="cooked">
                        <button class="select-trigger" type="button" data-select-label="Status" aria-label="Status">
                            <span class="select-label">Status</span>
                            <span class="arrow" aria-hidden="true"></span>
                        </button>
                        <div class="select-options" id="recipes-cooked-options">
                            <div class="option active" data-value="all">All</div>
                            <div class="option" data-value="tried">Tried</div>
                            <div class="option" data-value="nottried">Not tried</div>
                        </div>
                    </div>

                    <div class="results-count">Found: <span id="count"></span></div>
                    <button type="button" class="reset-filters" id="reset-filters">Reset</button>

                </div>
            </div>
        </div>
    </header>

    <main class="container page-wrapper">
        <div class="section-head">
            <h2 class="section-title">Recipes</h2>
            <span class="section-badge" id="badge-count"></span>
        </div>

        <div class="games-grid" id="games-grid">
            <!-- Empty state -->
            <div class="empty-state" id="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <p>No items found</p>
            </div>
        </div>

</main>

    <script src="../assets/js/js.js"></script>
</body>

</html>
